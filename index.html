<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LienFlow | Smart Lien Waiver Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 3rem; }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tagline { color: #94a3b8; margin-top: 0.5rem; }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }
        .auth-section { text-align: center; margin-bottom: 2rem; }
        .btn-google {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 2rem;
            background: white;
            color: #1e293b;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 1rem;
        }
        .btn-email {
            padding: 0.75rem 2rem;
            background: transparent;
            border: 1px solid #3b82f6;
            border-radius: 2rem;
            color: #3b82f6;
            font-weight: 600;
            cursor: pointer;
        }
        .email-form {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(15,23,42,0.5);
            border-radius: 1rem;
            display: none;
        }
        .email-form input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
        }
        .email-form button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .upload-area {
            border: 2px dashed #3b82f6;
            border-radius: 1.5rem;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            background: rgba(59,130,246,0.05);
            margin-bottom: 1.5rem;
        }
        .user-email { color: white; }
        .upload-area:hover { border-color: #60a5fa; background: rgba(96,165,250,0.1); }
        .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
        .extract-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .extract-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .progress-area { margin-top: 1rem; text-align: center; display: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results { margin-top: 2rem; display: none; }
        .data-grid {
            background: #0f172a;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .data-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            border-bottom: 1px solid #334155;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { padding: 0.75rem 1rem; background: #1e293b; font-weight: 600; color: #94a3b8; }
        .data-value { padding: 0.75rem 1rem; color: white; }
        .user-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }
        .upload-text { color: white; }
        .btn-logout {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
        }
        .hidden { display: none; }
        .footer { text-align: center; color: #64748b; margin-top: 2rem; font-size: 0.8rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">LienFlow</div>
        <div class="tagline">Instant AI extraction from construction lien waivers</div>
    </div>
    <div class="card">
        <div id="loginSection">
            <div class="auth-section">
                <!-- <button class="btn-google" id="googleLoginBtn">Continue with Google</button> -->
                <button class="btn-email" id="showEmailBtn">Sign in with Email</button>
                <div id="emailForm" class="email-form">
                    <input type="email" id="loginEmail" placeholder="Email address">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button id="emailLoginBtn">Sign In</button>
                    <p style="margin-top:0.5rem;"><a href="#" id="showSignupLink" style="color:#60a5fa;">No account? Sign up</a></p>
                </div>
            </div>
        </div>
        <div id="appSection" class="hidden">
            <div class="user-info">
                <span class="user-email" id="userEmail"></span>
                <button id="subscribeBtn" style="background: #3b82f6; color: white; border: none; padding: 0.25rem 1rem; border-radius: 1rem; margin-right: 0.5rem; cursor: pointer;">Start 7-Day Free Trial</button>
                <button class="btn-logout" id="logoutBtn">Sign Out</button>
            </div>
            <div style="color: #94a3b8; font-size: 0.85rem; text-align: center; margin-bottom: 1rem;">
                💡 7-day free trial · Then $49/month · Cancel anytime
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Click or drag PDF here</div>
                <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
            </div>
            <button class="extract-btn" id="extractBtn">Extract Data →</button>
            <div class="progress-area" id="progressArea">
                <div class="spinner"></div>
                <div class="eta">Extracting data... typically 3‑5 seconds</div>
            </div>
            <div class="results" id="results">
                <h3>📋 Extracted Information</h3>
                <div class="data-grid" id="dataGrid"></div>
            </div>
        </div>
    </div>
    <div class="footer">⚡ Fast • 🔒 Secure • No data stored longer than necessary</div>
</div>

<script>
    // ========== SUPABASE CREDENTIALS ==========
    const SUPABASEURL = 'https://yataoyjfxacqnfgsmaeg.supabase.co';
    const SUPABASEANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdGFveWpmeGFjcW5mZ3NtYWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTU0NzcsImV4cCI6MjA5NjMzMTQ3N30.9NiseMRBGbq80FiFYIFTIDnn0haed8A_IlPQZwcoXMI';

    // Create Supabase client once
    const supabaseClient = supabase.createClient(SUPABASEURL, SUPABASEANON_KEY);

    // DOM elements
    const loginSection = document.getElementById('loginSection');
    const appSection = document.getElementById('appSection');
    const userEmailSpan = document.getElementById('userEmail');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const showEmailBtn = document.getElementById('showEmailBtn');
    const emailForm = document.getElementById('emailForm');
    const emailLoginBtn = document.getElementById('emailLoginBtn');
    const showSignupLink = document.getElementById('showSignupLink');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const extractBtn = document.getElementById('extractBtn');
    const progressArea = document.getElementById('progressArea');
    const resultsDiv = document.getElementById('results');
    const dataGrid = document.getElementById('dataGrid');

    let isSignUpMode = false;

    showEmailBtn.addEventListener('click', () => {
        emailForm.style.display = emailForm.style.display === 'block' ? 'none' : 'block';
    });
    showSignupLink.addEventListener('click', (e) => {
        e.preventDefault();
        isSignUpMode = !isSignUpMode;
        showSignupLink.innerText = isSignUpMode ? 'Already have an account? Sign in' : 'No account? Sign up';
        emailLoginBtn.innerText = isSignUpMode ? 'Sign Up' : 'Sign In';
    });

    async function handleEmailAuth() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!email || !password) { alert('Please enter both email and password'); return; }
        let response;
        if (isSignUpMode) {
            response = await supabaseClient.auth.signUp({ email, password });
            if (response.error) alert('Sign up error: ' + response.error.message);
            else alert('Check your email for confirmation!');
        } else {
            response = await supabaseClient.auth.signInWithPassword({ email, password });
            if (response.error) alert('Login error: ' + response.error.message);
        }
        if (!response.error) emailForm.style.display = 'none';
    }
    emailLoginBtn.addEventListener('click', handleEmailAuth);

    async function signInWithGoogle() {
    // Clear any stale OAuth state to prevent redirect to localhost
    await supabaseClient.auth.signOut();
    localStorage.removeItem('supabase.auth.token');
    sessionStorage.clear();
    
    const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://lienflow-frontend.onrender.com' }
    });
    if (error) console.error('Google login error:', error);
}
    googleLoginBtn.addEventListener('click', signInWithGoogle);

    async function logout() { await supabaseClient.auth.signOut(); }
    logoutBtn.addEventListener('click', logout);

    // Subscribe button
    document.getElementById('subscribeBtn')?.addEventListener('click', async () => {
        const token = localStorage.getItem('supabase_token');
        if (!token) {
            alert('Please log in first');
            return;
        }
        try {
            const response = await fetch('https://lien-waiver-api-clean.onrender.com/create-checkout-session', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.url) {
                window.location.href = data.url;
            } else {
                alert('Error creating checkout session: ' + (data.detail || 'Unknown error'));
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
            localStorage.setItem('supabase_token', session.access_token);
            userEmailSpan.innerText = session.user.email;
            loginSection.classList.add('hidden');
            appSection.classList.remove('hidden');
        } else if (event === 'SIGNED_OUT') {
            localStorage.removeItem('supabase_token');
            loginSection.classList.remove('hidden');
            appSection.classList.add('hidden');
            resultsDiv.style.display = 'none';
            progressArea.style.display = 'none';
        }
    });

    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            localStorage.setItem('supabase_token', session.access_token);
            userEmailSpan.innerText = session.user.email;
            loginSection.classList.add('hidden');
            appSection.classList.remove('hidden');
        }
    }
    checkSession();

    // Upload logic
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#60a5fa'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#3b82f6'; });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#3b82f6';
        if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) uploadArea.querySelector('.upload-text').innerHTML = `📄 ${fileInput.files[0].name}`;
        else uploadArea.querySelector('.upload-text').innerHTML = 'Click or drag PDF here';
    });

    extractBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        const token = localStorage.getItem('supabase_token');
        if (!file) { alert('Select a PDF'); return; }
        if (!token) { alert('Please log in again'); return; }

        progressArea.style.display = 'block';
        resultsDiv.style.display = 'none';
        extractBtn.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        const startTime = Date.now();

        try {
            const response = await fetch('https://lien-waiver-api-clean.onrender.com/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const result = await response.json();
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

            if (response.ok && result.status === 'completed') {
                const d = result.data;
                let html = `
                    <div class="data-row"><div class="data-label">Claimant</div><div class="data-value">${escapeHtml(d.claimant_name || '')}</div></div>
                    <div class="data-row"><div class="data-label">Customer</div><div class="data-value">${escapeHtml(d.customer_name || '')}</div></div>
                    <div class="data-row"><div class="data-label">Project</div><div class="data-value">${escapeHtml(d.project_name || '')}</div></div>
                    <div class="data-row"><div class="data-label">Owner</div><div class="data-value">${escapeHtml(d.owner_name || '')}</div></div>
                    <div class="data-row"><div class="data-label">Amount Paid</div><div class="data-value">${escapeHtml(d.amount_paid || '')}</div></div>
                    <div class="data-row"><div class="data-label">Amount Due</div><div class="data-value">${escapeHtml(d.amount_due || '')}</div></div>
                    <div class="data-row"><div class="data-label">Date</div><div class="data-value">${escapeHtml(d.payment_date || '')}</div></div>
                    <div class="data-row"><div class="data-label">Type</div><div class="data-value">${escapeHtml(d.waiver_type || '')}</div></div>
                    <div class="data-row"><div class="data-label">Processing time</div><div class="data-value">${elapsed} seconds</div></div>
                `;
                dataGrid.innerHTML = html;
                resultsDiv.style.display = 'block';
            } else {
                dataGrid.innerHTML = `<div class="data-row"><div class="data-label">Error</div><div class="data-value">${escapeHtml(result.detail || result.message || 'Unknown error')}</div></div>`;
                resultsDiv.style.display = 'block';
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        } finally {
            progressArea.style.display = 'none';
            extractBtn.disabled = false;
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
